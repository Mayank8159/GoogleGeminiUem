AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Create an IAM role that GitHub Actions can assume via OIDC to deploy the SAM
  backend. The role includes a minimally permissive inline policy for
  CloudFormation, S3, Lambda, DynamoDB, CloudWatch Logs and basic IAM actions
  required during deployment.

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub owner/org (e.g. Mayank8159)
  GitHubRepo:
    Type: String
    Description: GitHub repository name (e.g. GoogleGeminiUem)
  GitHubBranch:
    Type: String
    Description: GitHub branch to allow (e.g. main)
  RoleName:
    Type: String
    Default: github-actions-sam-deploy
    Description: Name for the IAM role to create

Resources:
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      Policies:
        - PolicyName: GitHubActionsSAMDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ListStacks
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateTable
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: 'arn:aws:dynamodb:*:*:table/*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRole
                  - iam:DetachRolePolicy
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

Outputs:
  RoleArn:
    Description: ARN of the role to set as `AWS_ROLE_TO_ASSUME` in GitHub
    Value: !GetAtt GitHubActionsDeployRole.Arn
